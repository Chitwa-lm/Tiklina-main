<body class="font-body bg-mesh text-on-surface min-h-screen flex flex-col selection:bg-primary-container">
<!-- Splash Content Wrapper -->
<main class="flex-1 flex flex-col px-8 py-12 max-w-md mx-auto w-full">
<!-- Top Branding Section -->
<section class="flex flex-col items-center text-center mt-12 mb-16 space-y-4">
<div class="w-20 h-20 bg-primary-container rounded-3xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-5xl" data-icon="eco">eco</span>
</div>
<div class="space-y-1">
<h1 class="font-headline font-extrabold text-4xl tracking-tighter text-primary">Tiklina</h1>
<p class="text-on-surface-variant font-medium text-sm tracking-wide">THE DIGITAL STEWARD</p>
</div>
</section>
<!-- Welcome Message -->
<section class="mb-12 space-y-3">
<h2 class="font-headline font-bold text-3xl text-on-surface leading-tight">Welcome to the ecosystem.</h2>
<p class="text-on-surface-variant text-lg leading-relaxed">Choose your role to start managing waste more efficiently today.</p>
</section>
<!-- Role Selection Buttons (Bento-style Stack) -->
<section class="flex-1 flex flex-col gap-6">
<!-- Market Admin Role -->
<button class="group relative w-full text-left focus:outline-none transition-transform active:scale-95 duration-200">
<div class="glass-card p-6 rounded-3xl border border-outline-variant/10 shadow-[0_8px_24px_rgba(44,47,48,0.04)] flex items-center gap-5 overflow-hidden">
<!-- Accent Decoration -->
<div class="absolute -right-4 -top-4 w-24 h-24 bg-primary/5 rounded-full blur-2xl group-hover:bg-primary/10 transition-colors"></div>
<div class="w-16 h-16 rounded-2xl bg-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" data-icon="storefront">storefront</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-xl text-on-surface">I am a Market Admin</h3>
<p class="text-on-surface-variant text-sm mt-0.5">Manage stalls and waste collection schedules.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Waste Collector Role -->
<button class="group relative w-full text-left focus:outline-none transition-transform active:scale-95 duration-200">
<div class="glass-card p-6 rounded-3xl border border-outline-variant/10 shadow-[0_8px_24px_rgba(44,47,48,0.04)] flex items-center gap-5 overflow-hidden">
<!-- Accent Decoration -->
<div class="absolute -right-4 -top-4 w-24 h-24 bg-primary/5 rounded-full blur-2xl group-hover:bg-primary/10 transition-colors"></div>
<div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="local_shipping">local_shipping</span>
</div>
<div class="flex-1">
<h3 class="font-headline font-bold text-xl text-on-surface">I am a Waste Collector</h3>
<p class="text-on-surface-variant text-sm mt-0.5">Find nearby pickups and optimize your routes.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</section>
<!-- Visual Anchor (Bottom Illustration/Image) -->
<footer class="mt-auto pt-12 text-center opacity-60">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Connecting for a greener future</span>
</div>
<!-- Contextual Background Image Element -->
<div class="mt-8 rounded-2xl overflow-hidden h-32 relative grayscale mix-blend-multiply opacity-20">
